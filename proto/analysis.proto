syntax = "proto3";

package analysis;

option go_package = "gavel/proto/gen";

message ArticleRequest {
  string text       = 1;
  string source_url = 2;
}

message AnalysisResult {
  map<string, StringList> entities = 1;
  string topic      = 2;
  float  confidence = 3;
  string summary    = 4;
}

message StringList {
  repeated string values = 1;
}

message BatchRequest {
  repeated ArticleRequest articles = 1;
}

message BatchResponse {
  repeated AnalysisResult results = 1;
}

service AnalysisService {
  rpc AnalyzeBatch (BatchRequest) returns (BatchResponse);
}
